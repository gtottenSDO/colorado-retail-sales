name: Render check

# Smoke test: the scheduled refresh only runs monthly, so without this a
# broken dashboard.qmd wouldn't surface until the next auto-refresh.

on:
  pull_request:
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            tidyverse
            readxl
            arrow
            janitor
            scales
            lubridate
            quarto

      - uses: quarto-dev/quarto-actions/setup@v2

      - name: Collect data
        run: Rscript R/collect_data.R

      - name: Render dashboard
        run: quarto render dashboard.qmd
